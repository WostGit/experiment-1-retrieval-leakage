name: experiment-1-retrieval-leakage-clear

on:
  push:
    paths:
      - ".github/workflows/experiment1.yml"
  pull_request:
    paths:
      - ".github/workflows/experiment1.yml"
  workflow_dispatch:

jobs:
  retrieval-leakage:
    name: Run Experiment 1 - Clear Retrieval Leakage Demo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONHASHSEED: "0"
      TRACELEAKS_SEED: "1337"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Explain experiment before running
        run: |
          echo "========================================================================"
          echo "EXPERIMENT 1: RETRIEVAL ACCESS-PATTERN LEAKAGE"
          echo "========================================================================"
          echo
          echo "This experiment shows one simple privacy failure:"
          echo
          echo "  The final LLM answer can hide the secret,"
          echo "  but the internal retrieval log can still reveal the secret."
          echo
          echo "Example:"
          echo
          echo "  Hidden secret label:"
          echo "    label_1"
          echo
          echo "  Final answer shown to user:"
          echo "    The follow-up has been scheduled."
          echo
          echo "  Internal retrieval log:"
          echo "    route_B_30"
          echo
          echo "The final answer does not say label_1."
          echo "But if route_B_30 usually appears for label_1 cases,"
          echo "then the route leaks the secret."
          echo
          echo "The experiment compares three attacker views:"
          echo
          echo "  1. Final answer only"
          echo "     Expected: attacker fails."
          echo
          echo "  2. Retrieval route"
          echo "     Expected: attacker succeeds."
          echo
          echo "  3. Redacted retrieval route"
          echo "     Expected: attacker fails again."
          echo
          echo "Security lesson:"
          echo "  Privacy must be evaluated over logs and metadata,"
          echo "  not only over the final answer."
          echo "========================================================================"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-experiment1-clear-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scikit-learn

      - name: Create experiment script
        run: |
          mkdir -p experiments results

          cat > experiments/retrieval_leakage.py <<'PY'
          from __future__ import annotations

          import argparse
          import json
          import random
          from collections import Counter
          from pathlib import Path

          import numpy as np
          from sklearn.feature_extraction import DictVectorizer
          from sklearn.linear_model import LogisticRegression
          from sklearn.metrics import accuracy_score
          from sklearn.model_selection import train_test_split


          def make_route_mapping(n_labels: int) -> dict[str, str]:
              return {
                  f"label_{i}": f"route_{chr(65 + i)}_{17 + i * 13}"
                  for i in range(n_labels)
              }


          def make_records(n_records: int, n_labels: int, seed: int) -> tuple[list[dict], dict[str, str]]:
              random.seed(seed)
              np.random.seed(seed)

              labels = [f"label_{i}" for i in range(n_labels)]
              route_mapping = make_route_mapping(n_labels)

              generic_final_answers = [
                  "The requested follow-up has been prepared.",
                  "The case has been processed successfully.",
                  "The next step has been scheduled.",
                  "The request has been handled.",
              ]

              records = []

              for i in range(n_records):
                  secret_label = labels[i % n_labels]
                  final_answer = random.choice(generic_final_answers)
                  retrieval_route = route_mapping[secret_label]

                  records.append(
                      {
                          "record_id": f"case_{i:04d}",

                          # This is the private secret.
                          # The attacker should not directly see this.
                          "secret_label": secret_label,

                          # This is the final answer the user sees.
                          # It is generic and does not contain the secret label.
                          "final_answer": final_answer,

                          # This is internal metadata.
                          # It does not literally say label_1, label_2, etc.,
                          # but it is correlated with the secret label.
                          "retrieval_route": retrieval_route,

                          # This is the mitigated/redacted version.
                          # Every secret label maps to the same generic route.
                          "redacted_retrieval_route": "route_sensitive_generic",
                      }
                  )

              random.shuffle(records)
              return records, route_mapping


          def attacker_view(record: dict, view: str) -> dict:
              if view == "final_answer_only":
                  return {"final_answer": record["final_answer"]}

              if view == "retrieval_route":
                  return {"retrieval_route": record["retrieval_route"]}

              if view == "redacted_retrieval_route":
                  return {"retrieval_route": record["redacted_retrieval_route"]}

              raise ValueError(f"Unknown view: {view}")


          def majority_attack(train: list[dict], test: list[dict]) -> list[str]:
              majority = Counter(r["secret_label"] for r in train).most_common(1)[0][0]
              return [majority for _ in test]


          def learned_attack(train: list[dict], test: list[dict], view: str) -> list[str]:
              x_train = [attacker_view(r, view) for r in train]
              y_train = [r["secret_label"] for r in train]
              x_test = [attacker_view(r, view) for r in test]

              vectorizer = DictVectorizer()
              x_train_vec = vectorizer.fit_transform(x_train)
              x_test_vec = vectorizer.transform(x_test)

              model = LogisticRegression(max_iter=1000, random_state=0)
              model.fit(x_train_vec, y_train)

              return model.predict(x_test_vec).tolist()


          def evaluate(records: list[dict], seed: int) -> dict:
              train, test = train_test_split(
                  records,
                  test_size=0.35,
                  random_state=seed,
                  stratify=[r["secret_label"] for r in records],
              )

              y_true = [r["secret_label"] for r in test]

              views = [
                  "final_answer_only",
                  "retrieval_route",
                  "redacted_retrieval_route",
              ]

              results = {}
              samples = {}

              majority_preds = majority_attack(train, test)
              results["majority_baseline_accuracy"] = float(
                  accuracy_score(y_true, majority_preds)
              )

              for view in views:
                  preds = learned_attack(train, test, view)
                  acc = float(accuracy_score(y_true, preds))
                  results[f"{view}_accuracy"] = acc

                  samples[view] = [
                      {
                          "record_id": record["record_id"],
                          "what_attacker_sees": attacker_view(record, view),
                          "secret_label_hidden_from_attacker": true,
                          "attacker_guess": pred,
                          "correct": true == pred,
                      }
                      for record, true, pred in zip(test[:5], y_true[:5], preds[:5])
                  ]

              return {
                  "n_train": len(train),
                  "n_test": len(test),
                  "results": results,
                  "samples": samples,
                  "train_label_distribution": dict(Counter(r["secret_label"] for r in train)),
                  "test_label_distribution": dict(Counter(r["secret_label"] for r in test)),
              }


          def main() -> None:
              parser = argparse.ArgumentParser()
              parser.add_argument("--n-records", type=int, default=200)
              parser.add_argument("--n-labels", type=int, default=5)
              parser.add_argument("--seed", type=int, default=1337)
              parser.add_argument("--out", type=str, required=True)
              args = parser.parse_args()

              records, route_mapping = make_records(
                  n_records=args.n_records,
                  n_labels=args.n_labels,
                  seed=args.seed,
              )

              evaluation = evaluate(records, args.seed)

              output = {
                  "config": {
                      "n_records": args.n_records,
                      "n_labels": args.n_labels,
                      "seed": args.seed,
                      "chance_accuracy": 1.0 / args.n_labels,
                  },
                  "route_mapping_for_human_explanation_only": route_mapping,
                  "example_records_for_human_explanation": records[:5],
                  "evaluation": evaluation,
              }

              out = Path(args.out)
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_text(json.dumps(output, indent=2, sort_keys=True), encoding="utf-8")


          if __name__ == "__main__":
              main()
          PY

      - name: Run experiment
        run: |
          python experiments/retrieval_leakage.py \
            --n-records 200 \
            --n-labels 5 \
            --seed 1337 \
            --out results/retrieval_ci.json

      - name: Print clear explanation of inputs and outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("results/retrieval_ci.json").read_text())
          results = data["evaluation"]["results"]
          samples = data["evaluation"]["samples"]

          print()
          print("========================================================================")
          print("CLEAR EXPLANATION OF THE EXPERIMENT")
          print("========================================================================")
          print()
          print("We created synthetic private cases.")
          print()
          print("Each case has:")
          print("  1. A secret label")
          print("     Example: label_1")
          print()
          print("  2. A final answer")
          print("     Example: The follow-up has been scheduled.")
          print("     This is what the user sees.")
          print("     It is generic and should not reveal the secret label.")
          print()
          print("  3. A retrieval route")
          print("     Example: route_B_30")
          print("     This is internal metadata from the retrieval system.")
          print("     It does not literally say label_1.")
          print("     But it can still reveal label_1 if the attacker learns the mapping.")
          print()
          print("  4. A redacted retrieval route")
          print("     Example: route_sensitive_generic")
          print("     This is the mitigation.")
          print("     It hides the label-specific route.")
          print()

          print("========================================================================")
          print("HIDDEN ROUTE MAPPING")
          print("========================================================================")
          print()
          print("This mapping is printed only so humans can understand the experiment.")
          print("The attacker is NOT directly given this mapping.")
          print("The attacker learns the pattern from training examples.")
          print()
          for label, route in sorted(data["route_mapping_for_human_explanation_only"].items()):
              print(f"  {label:8} -> {route}")
          print()

          print("========================================================================")
          print("EXAMPLE FULL RECORDS")
          print("========================================================================")
          print()
          print("These full records are shown only for explanation.")
          print("In the attack, the attacker never receives the full record.")
          print()
          for record in data["example_records_for_human_explanation"][:3]:
              print("FULL RECORD")
              print(json.dumps(record, indent=2, sort_keys=True))
              print()
              print("Explanation:")
              print(f"  Secret label: {record['secret_label']}")
              print("    This is private.")
              print()
              print(f"  Final answer: {record['final_answer']}")
              print("    This is visible and generic.")
              print()
              print(f"  Retrieval route: {record['retrieval_route']}")
              print("    This is internal metadata and may leak the secret.")
              print()
              print(f"  Redacted retrieval route: {record['redacted_retrieval_route']}")
              print("    This is the mitigated version.")
              print()
              print("-" * 72)

          print()
          print("========================================================================")
          print("WHAT EACH ATTACKER SEES")
          print("========================================================================")
          print()
          print("The same private case can be shown to the attacker in three ways.")
          print()
          print("View 1: final_answer_only")
          print("  The attacker sees only the final text.")
          print("  Expected result: attacker fails.")
          print()
          print("View 2: retrieval_route")
          print("  The attacker sees the internal retrieval route.")
          print("  Expected result: attacker succeeds.")
          print()
          print("View 3: redacted_retrieval_route")
          print("  The attacker sees only a generic route.")
          print("  Expected result: attacker fails again.")
          print()

          print("========================================================================")
          print("SAMPLE ATTACKS")
          print("========================================================================")

          for view in [
              "final_answer_only",
              "retrieval_route",
              "redacted_retrieval_route",
          ]:
              print()
              print("-" * 72)
              print(f"ATTACKER VIEW: {view}")
              print("-" * 72)

              if view == "final_answer_only":
                  print("Meaning:")
                  print("  Attacker sees only the final answer.")
                  print("  This should not reveal the secret label.")
              elif view == "retrieval_route":
                  print("Meaning:")
                  print("  Attacker sees the internal retrieval route.")
                  print("  This can leak the secret label.")
              else:
                  print("Meaning:")
                  print("  Attacker sees only the redacted generic route.")
                  print("  This should remove the leakage signal.")

              print()

              for row in samples[view][:3]:
                  print("ATTACK EXAMPLE")
                  print(json.dumps(row, indent=2, sort_keys=True))
                  print()
                  print("Human explanation:")
                  print(f"  The attacker sees: {row['what_attacker_sees']}")
                  print(f"  The true hidden label is: {row['secret_label_hidden_from_attacker']}")
                  print(f"  The attacker guesses: {row['attacker_guess']}")
                  print(f"  Was the attacker correct? {row['correct']}")
                  print()

          print()
          print("========================================================================")
          print("FINAL RESULT TABLE")
          print("========================================================================")
          print()
          print(f"{'What attacker sees':30} {'Accuracy':>10}   Meaning")
          print("-" * 80)
          print(f"{'Majority baseline':30} {results['majority_baseline_accuracy']:10.4f}   Naive guessing")
          print(f"{'Final answer only':30} {results['final_answer_only_accuracy']:10.4f}   Final text does not leak")
          print(f"{'Retrieval route':30} {results['retrieval_route_accuracy']:10.4f}   Metadata leaks secret")
          print(f"{'Redacted retrieval route':30} {results['redacted_retrieval_route_accuracy']:10.4f}   Redaction removes leak")
          print()

          print("========================================================================")
          print("INTERPRETATION")
          print("========================================================================")
          print()
          print("If the attacker sees only final answers, accuracy is low.")
          print("That means the final text looks private.")
          print()
          print("If the attacker sees retrieval routes, accuracy is high.")
          print("That means the internal retrieval metadata leaks the hidden label.")
          print()
          print("If the attacker sees redacted retrieval routes, accuracy goes low again.")
          print("That means redacting the retrieval route mitigates the leak.")
          print()
          print("Main lesson:")
          print("  Do not evaluate LLM-agent privacy only by checking final answers.")
          print("  You must also check retrieval traces, logs, tool calls, and metadata.")
          print()

          print("========================================================================")
          print("ONE-LINE TAKEAWAY")
          print("========================================================================")
          print()
          print("The final answer hides the secret, but the retrieval log reveals it.")
          print()
          PY

      - name: Check expected pattern
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("results/retrieval_ci.json").read_text())
          results = data["evaluation"]["results"]

          output_acc = results["final_answer_only_accuracy"]
          route_acc = results["retrieval_route_accuracy"]
          redacted_acc = results["redacted_retrieval_route_accuracy"]

          print("PASS / FAIL CHECKS")
          print("==================")
          print(f"final_answer_only_accuracy:        {output_acc:.4f}")
          print(f"retrieval_route_accuracy:          {route_acc:.4f}")
          print(f"redacted_retrieval_route_accuracy: {redacted_acc:.4f}")
          print()

          if output_acc > 0.45:
              raise SystemExit("FAIL: final answer leaks too much.")

          if route_acc < 0.90:
              raise SystemExit("FAIL: retrieval route did not leak as expected.")

          if redacted_acc > 0.45:
              raise SystemExit("FAIL: redacted route still leaks too much.")

          print("PASS")
          print("The expected pattern was reproduced:")
          print("  final answer only -> attacker fails")
          print("  retrieval route -> attacker succeeds")
          print("  redacted route -> attacker fails")
          PY

      - name: Upload retrieval leakage results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-1-retrieval-leakage-results
          path: results/retrieval_ci.json
          if-no-files-found: error
