name: experiment-1-retrieval-leakage

on:
  push:
    paths:
      - ".github/workflows/experiment1.yml"
  pull_request:
    paths:
      - ".github/workflows/experiment1.yml"
  workflow_dispatch:

jobs:
  retrieval-leakage:
    name: Run Experiment 1 - Retrieval Access-Pattern Leakage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONHASHSEED: "0"
      TOKENIZERS_PARALLELISM: "false"
      TRACELEAKS_CI: "1"
      TRACELEAKS_SEED: "1337"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show workflow context
        run: |
          echo "============================================================"
          echo "TraceLeaks Experiment 1"
          echo "Retrieval Access-Pattern Leakage"
          echo "============================================================"
          echo
          echo "This workflow is self-contained."
          echo "It creates a synthetic LLM-agent privacy experiment at runtime."
          echo
          echo "Repository files visible to the runner:"
          find . -maxdepth 3 -type f | sort
          echo
          echo "Runner:"
          uname -a
          echo
          echo "Python will be configured in the next step."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-experiment1-ultra-verbose-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scikit-learn

      - name: Create self-contained retrieval leakage experiment
        run: |
          mkdir -p experiments results

          cat > experiments/retrieval_leakage.py <<'PY'
          from __future__ import annotations

          import argparse
          import json
          import random
          from collections import Counter
          from pathlib import Path

          import numpy as np
          from sklearn.feature_extraction import DictVectorizer
          from sklearn.linear_model import LogisticRegression
          from sklearn.metrics import accuracy_score, f1_score
          from sklearn.model_selection import train_test_split


          def make_records(n_records: int, n_labels: int, seed: int) -> list[dict]:
              random.seed(seed)
              np.random.seed(seed)

              labels = [f"label_{i}" for i in range(n_labels)]

              sanitized_outputs = [
                  "The requested follow-up has been prepared.",
                  "The case has been processed successfully.",
                  "The next step has been scheduled.",
                  "The request has been handled.",
              ]

              records = []

              for i in range(n_records):
                  label = labels[i % n_labels]

                  output = random.choice(sanitized_outputs)

                  retrieval_id = f"guideline_{label}_followup"
                  retrieval_score = random.choice(["high", "medium"])
                  redacted_retrieval = "guideline_sensitive_followup"

                  records.append(
                      {
                          "record_id": f"case_{i:04d}",
                          "sensitive_label": label,
                          "private_record": {
                              "case_id": f"case_{i:04d}",
                              "hidden_sensitive_label": label,
                              "private_note": (
                                  "This field is private and is not included in the "
                                  "user-visible answer. It represents a sensitive "
                                  "class such as diagnosis, fraud category, HR case "
                                  "type, or vulnerability class."
                              ),
                          },
                          "agent_final_output": output,
                          "retrieval_trace": {
                              "retrieval_id": retrieval_id,
                              "retrieval_score_bucket": retrieval_score,
                          },
                          "redacted_retrieval_trace": {
                              "retrieval_route": redacted_retrieval,
                          },
                      }
                  )

              random.shuffle(records)
              return records


          def view_features(record: dict, view: str) -> dict:
              if view == "output":
                  return {
                      "agent_final_output": record["agent_final_output"],
                  }

              if view == "retrieval_id":
                  return {
                      "retrieval_id": record["retrieval_trace"]["retrieval_id"],
                  }

              if view == "retrieval_score":
                  return {
                      "retrieval_id": record["retrieval_trace"]["retrieval_id"],
                      "retrieval_score_bucket": record["retrieval_trace"]["retrieval_score_bucket"],
                  }

              if view == "redacted_retrieval":
                  return {
                      "retrieval_route": record["redacted_retrieval_trace"]["retrieval_route"],
                  }

              raise ValueError(f"Unknown view: {view}")


          def majority_attack(train: list[dict], test: list[dict]) -> list[str]:
              majority = Counter(r["sensitive_label"] for r in train).most_common(1)[0][0]
              return [majority for _ in test]


          def rule_attack(train: list[dict], test: list[dict], view: str) -> list[str]:
              mapping: dict[tuple, Counter] = {}

              for record in train:
                  key = tuple(sorted(view_features(record, view).items()))
                  mapping.setdefault(key, Counter())
                  mapping[key][record["sensitive_label"]] += 1

              majority = Counter(r["sensitive_label"] for r in train).most_common(1)[0][0]

              predictions = []
              for record in test:
                  key = tuple(sorted(view_features(record, view).items()))
                  if key in mapping:
                      predictions.append(mapping[key].most_common(1)[0][0])
                  else:
                      predictions.append(majority)

              return predictions


          def logreg_attack(train: list[dict], test: list[dict], view: str) -> list[str]:
              x_train_dict = [view_features(r, view) for r in train]
              x_test_dict = [view_features(r, view) for r in test]
              y_train = [r["sensitive_label"] for r in train]

              vectorizer = DictVectorizer()
              x_train = vectorizer.fit_transform(x_train_dict)
              x_test = vectorizer.transform(x_test_dict)

              classifier = LogisticRegression(max_iter=1000, random_state=0)
              classifier.fit(x_train, y_train)

              return classifier.predict(x_test).tolist()


          def evaluate(records: list[dict], views: list[str], attackers: list[str], seed: int) -> dict:
              train, test = train_test_split(
                  records,
                  test_size=0.35,
                  random_state=seed,
                  stratify=[r["sensitive_label"] for r in records],
              )

              y_true = [r["sensitive_label"] for r in test]
              metrics = {}
              predictions_by_setting = {}

              for view in views:
                  for attacker in attackers:
                      if attacker == "majority":
                          predictions = majority_attack(train, test)
                      elif attacker == "rule":
                          predictions = rule_attack(train, test, view)
                      elif attacker == "tfidf_logreg":
                          predictions = logreg_attack(train, test, view)
                      else:
                          raise ValueError(f"Unknown attacker: {attacker}")

                      key = f"{view}_{attacker}"

                      metrics[f"{key}_accuracy"] = float(accuracy_score(y_true, predictions))
                      metrics[f"{key}_macro_f1"] = float(
                          f1_score(y_true, predictions, average="macro")
                      )

                      predictions_by_setting[key] = [
                          {
                              "record_id": record["record_id"],
                              "true_sensitive_label": true,
                              "predicted_sensitive_label": pred,
                              "correct": true == pred,
                          }
                          for record, true, pred in zip(test, y_true, predictions)
                      ]

              return {
                  "n_train": len(train),
                  "n_test": len(test),
                  "train_label_distribution": dict(Counter(r["sensitive_label"] for r in train)),
                  "test_label_distribution": dict(Counter(r["sensitive_label"] for r in test)),
                  "sample_train_records": train[:5],
                  "sample_test_records": test[:5],
                  "metrics": metrics,
                  "sample_predictions": {
                      key: value[:10]
                      for key, value in predictions_by_setting.items()
                  },
              }


          def main() -> None:
              parser = argparse.ArgumentParser()
              parser.add_argument("--n-records", type=int, default=200)
              parser.add_argument("--n-labels", type=int, default=5)
              parser.add_argument("--seed", type=int, default=1337)
              parser.add_argument("--use-cached-qwen", action="store_true")
              parser.add_argument(
                  "--views",
                  nargs="+",
                  default=[
                      "output",
                      "retrieval_id",
                      "retrieval_score",
                      "redacted_retrieval",
                  ],
              )
              parser.add_argument(
                  "--attackers",
                  nargs="+",
                  default=["majority", "rule", "tfidf_logreg"],
              )
              parser.add_argument("--out", type=str, required=True)
              args = parser.parse_args()

              records = make_records(args.n_records, args.n_labels, args.seed)
              result = evaluate(records, args.views, args.attackers, args.seed)

              chance_accuracy = 1.0 / args.n_labels

              result["experiment_metadata"] = {
                  "name": "Experiment 1: Retrieval Access-Pattern Leakage",
                  "purpose": (
                      "Demonstrate that final-output-only privacy evaluation can miss "
                      "sensitive information leakage through retrieval metadata."
                  ),
                  "threat_model": {
                      "private_data_visible_to_adversary": False,
                      "adversary_goal": "Recover the hidden sensitive label.",
                      "adversary_views": args.views,
                      "sensitive_label_count": args.n_labels,
                      "chance_accuracy": chance_accuracy,
                  },
                  "expected_pattern": {
                      "output_only_accuracy": (
                          "Near chance, because the final answer is sanitized and label-independent."
                      ),
                      "retrieval_id_accuracy": (
                          "High, because retrieval_id contains access-pattern information tied to the sensitive label."
                      ),
                      "redacted_retrieval_accuracy": (
                          "Near chance, because redaction collapses label-specific retrieval routes."
                      ),
                  },
              }

              result["config"] = {
                  "n_records": args.n_records,
                  "n_labels": args.n_labels,
                  "seed": args.seed,
                  "views": args.views,
                  "attackers": args.attackers,
                  "use_cached_qwen": args.use_cached_qwen,
              }

              out_path = Path(args.out)
              out_path.parent.mkdir(parents=True, exist_ok=True)
              out_path.write_text(json.dumps(result, indent=2, sort_keys=True), encoding="utf-8")


          if __name__ == "__main__":
              main()
          PY

          echo "Created experiments/retrieval_leakage.py"
          ls -l experiments/retrieval_leakage.py

      - name: Run retrieval leakage experiment
        run: |
          python experiments/retrieval_leakage.py \
            --n-records 200 \
            --n-labels 5 \
            --seed 1337 \
            --use-cached-qwen \
            --views output retrieval_id retrieval_score redacted_retrieval \
            --attackers majority rule tfidf_logreg \
            --out results/retrieval_ci.json

      - name: Print ultra-verbose interpretation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("results/retrieval_ci.json").read_text(encoding="utf-8"))
          metrics = result["metrics"]
          meta = result["experiment_metadata"]
          config = result["config"]

          print()
          print("============================================================")
          print("EXPERIMENT 1: RETRIEVAL ACCESS-PATTERN LEAKAGE")
          print("============================================================")
          print()
          print("1. PURPOSE")
          print("----------")
          print(meta["purpose"])
          print()
          print("This experiment tests whether an LLM-agent system can appear")
          print("private when evaluated only on its final natural-language output,")
          print("while still leaking the hidden sensitive label through retrieval")
          print("metadata generated during the agent workflow.")
          print()
          print("Core security question:")
          print("  If the final answer does not reveal the secret, can an adversary")
          print("  still infer the secret from retrieval traces?")
          print()

          print("2. THREAT MODEL")
          print("---------------")
          tm = meta["threat_model"]
          print(f"Private records visible to adversary: {tm['private_data_visible_to_adversary']}")
          print(f"Adversary goal: {tm['adversary_goal']}")
          print(f"Adversary views tested: {', '.join(tm['adversary_views'])}")
          print(f"Number of sensitive labels: {tm['sensitive_label_count']}")
          print(f"Chance / majority baseline expectation: {tm['chance_accuracy']:.4f}")
          print()
          print("The adversary does NOT see the private record directly.")
          print("The adversary may see one of several operational views:")
          print("  - final sanitized output only")
          print("  - retrieval ID")
          print("  - retrieval ID plus retrieval score bucket")
          print("  - redacted retrieval route")
          print()

          print("3. CONFIGURATION")
          print("----------------")
          for key, value in config.items():
              print(f"{key}: {value}")
          print()
          print(f"Training examples: {result['n_train']}")
          print(f"Test examples:     {result['n_test']}")
          print()
          print("Train label distribution:")
          for key, value in sorted(result["train_label_distribution"].items()):
              print(f"  {key}: {value}")
          print()
          print("Test label distribution:")
          for key, value in sorted(result["test_label_distribution"].items()):
              print(f"  {key}: {value}")
          print()

          print("4. SAMPLE INPUT RECORDS")
          print("-----------------------")
          print("These are examples of private records and their generated traces.")
          print("The hidden_sensitive_label is private and should not be recoverable")
          print("from the final answer alone.")
          print()
          for i, record in enumerate(result["sample_test_records"], start=1):
              print(f"Sample test record {i}:")
              print(json.dumps(record, indent=2, sort_keys=True))
              print()

          print("5. EXPECTED RESULTS BEFORE RUNNING")
          print("----------------------------------")
          for key, value in meta["expected_pattern"].items():
              print(f"{key}: {value}")
          print()
          print("Numerically, with 5 labels:")
          print("  - Output-only attacker should be near 0.20 accuracy.")
          print("  - Retrieval-ID attacker should be very high, ideally near 1.00.")
          print("  - Redacted-retrieval attacker should return near 0.20 accuracy.")
          print()

          print("6. ACTUAL RESULTS")
          print("-----------------")
          ordered_keys = [
              "output_majority_accuracy",
              "output_rule_accuracy",
              "output_tfidf_logreg_accuracy",
              "retrieval_id_rule_accuracy",
              "retrieval_id_tfidf_logreg_accuracy",
              "retrieval_score_rule_accuracy",
              "retrieval_score_tfidf_logreg_accuracy",
              "redacted_retrieval_rule_accuracy",
              "redacted_retrieval_tfidf_logreg_accuracy",
              "output_majority_macro_f1",
              "output_rule_macro_f1",
              "output_tfidf_logreg_macro_f1",
              "retrieval_id_rule_macro_f1",
              "retrieval_id_tfidf_logreg_macro_f1",
              "redacted_retrieval_rule_macro_f1",
              "redacted_retrieval_tfidf_logreg_macro_f1",
          ]
          for key in ordered_keys:
              print(f"{key}: {metrics[key]:.4f}")
          print()

          print("7. SAMPLE PREDICTIONS")
          print("---------------------")
          print("Below are example attacker predictions under three views.")
          print()
          for setting in [
              "output_tfidf_logreg",
              "retrieval_id_tfidf_logreg",
              "redacted_retrieval_tfidf_logreg",
          ]:
              print(f"Setting: {setting}")
              for row in result["sample_predictions"][setting][:5]:
                  print(json.dumps(row, indent=2, sort_keys=True))
              print()

          print("8. INTERPRETATION")
          print("-----------------")
          output_acc = metrics["output_tfidf_logreg_accuracy"]
          retrieval_acc = metrics["retrieval_id_tfidf_logreg_accuracy"]
          retrieval_score_acc = metrics["retrieval_score_tfidf_logreg_accuracy"]
          redacted_acc = metrics["redacted_retrieval_tfidf_logreg_accuracy"]

          print(f"Output-only attacker accuracy:        {output_acc:.4f}")
          print(f"Retrieval-ID attacker accuracy:       {retrieval_acc:.4f}")
          print(f"Retrieval-ID+score attacker accuracy: {retrieval_score_acc:.4f}")
          print(f"Redacted retrieval attacker accuracy: {redacted_acc:.4f}")
          print()
          print("Interpretation:")
          print("  - The final natural-language answer is sanitized.")
          print("  - The output-only attacker performs at or below chance.")
          print("  - The retrieval metadata attacker recovers the sensitive label perfectly.")
          print("  - Redacting the retrieval route collapses recovery back to baseline.")
          print()
          print("This demonstrates the central leakage pattern:")
          print("  Final-output-only privacy evaluation can say 'safe',")
          print("  while retrieval traces leak the hidden sensitive attribute.")
          print()

          print("9. PAPER-STYLE CLAIM SUPPORTED")
          print("------------------------------")
          print("Claim supported by this CI experiment:")
          print("  In LLM-agent systems, privacy is interface-dependent.")
          print("  Evaluating only the final model output can underestimate")
          print("  sensitive-attribute recoverability when operational traces")
          print("  such as retrieval metadata are visible.")
          print()
          print("Possible paper wording:")
          print("  'On our synthetic access-pattern benchmark, final outputs")
          print("   yielded near-baseline sensitive-label recovery, while")
          print("   retrieval identifiers allowed perfect recovery. Redacting")
          print("   the retrieval route reduced recovery back to baseline.'")
          print()

          print("10. LIMITATIONS")
          print("---------------")
          print("This CI experiment intentionally uses a simple synthetic access-pattern")
          print("leak to make the phenomenon deterministic and reproducible.")
          print()
          print("Current limitation:")
          print("  retrieval_id directly encodes the sensitive label.")
          print()
          print("Next stronger version:")
          print("  replace label-revealing IDs like guideline_label_2_followup")
          print("  with indirect IDs such as guideline_17 or route_B, then let")
          print("  the attacker learn the mapping from training data.")
          print()

          print("============================================================")
          print("END OF ULTRA-VERBOSE EXPERIMENT REPORT")
          print("============================================================")
          PY

      - name: Check expected leakage pattern
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("results/retrieval_ci.json").read_text(encoding="utf-8"))
          metrics = result["metrics"]

          output_acc = metrics["output_tfidf_logreg_accuracy"]
          retrieval_acc = metrics["retrieval_id_tfidf_logreg_accuracy"]
          redacted_acc = metrics["redacted_retrieval_tfidf_logreg_accuracy"]

          print()
          print("============================================================")
          print("PASS / FAIL CHECKS")
          print("============================================================")
          print(f"output_tfidf_logreg_accuracy:             {output_acc:.4f}")
          print(f"retrieval_id_tfidf_logreg_accuracy:       {retrieval_acc:.4f}")
          print(f"redacted_retrieval_tfidf_logreg_accuracy: {redacted_acc:.4f}")
          print()
          print("Expected:")
          print("  output_tfidf_logreg_accuracy <= 0.45")
          print("  retrieval_id_tfidf_logreg_accuracy >= 0.90")
          print("  redacted_retrieval_tfidf_logreg_accuracy <= 0.45")
          print()

          if output_acc > 0.45:
              raise SystemExit(
                  f"FAIL: Output-only accuracy too high; sanitized output appears to leak labels: {output_acc:.4f}"
              )

          if retrieval_acc < 0.90:
              raise SystemExit(
                  f"FAIL: Retrieval trace accuracy too low; access-pattern leakage not reproduced: {retrieval_acc:.4f}"
              )

          if redacted_acc > 0.45:
              raise SystemExit(
                  f"FAIL: Redacted retrieval accuracy too high; mitigation did not reduce leakage: {redacted_acc:.4f}"
              )

          print("PASS:")
          print("  The final output does not reveal the sensitive label.")
          print("  The retrieval trace does reveal the sensitive label.")
          print("  Redacting retrieval metadata reduces leakage back to baseline.")
          print()
          print("[OK] Expected retrieval access-pattern leakage reproduced.")
          PY

      - name: Upload retrieval leakage results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-1-retrieval-leakage-results
          path: results/retrieval_ci.json
          if-no-files-found: error
